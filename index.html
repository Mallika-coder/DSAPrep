<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallika's DSA Sheet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f23;
            --card: #1a1a2e;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --text: #e0e0e0;
            --muted: #8892b0;
            --success: #64ffda;
            --border: #233554;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 8px; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--muted); font-size: 1.1rem; }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-card .label { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: var(--card);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab:hover { background: rgba(108,99,255,0.1); color: var(--text); }
        .tab.active { background: var(--accent); color: #fff; }

        /* Search & Filters */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            font-size: 0.95rem;
        }
        .search-box:focus { outline: none; border-color: var(--accent); }
        .filter-btn {
            padding: 10px 16px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

        /* Problem Table */
        .section { margin-bottom: 30px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            cursor: pointer;
        }
        .section-header h3 { font-size: 1.1rem; }
        .section-header .badge {
            background: var(--accent);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .section-body {
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }
        .problem-row {
            display: grid;
            grid-template-columns: 40px 1fr 90px 180px 50px 50px;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .problem-row:hover { background: rgba(108,99,255,0.05); }
        .problem-row:last-child { border-bottom: none; }
        .problem-row .num { color: var(--muted); font-size: 0.85rem; }
        .problem-row .name a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }
        .problem-row .name a:hover { color: var(--accent); text-decoration: underline; }
        .problem-row .diff {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
        }
        .diff-easy { background: rgba(100,255,218,0.15); color: var(--success); }
        .diff-medium { background: rgba(255,200,50,0.15); color: #ffc832; }
        .diff-hard { background: rgba(255,101,132,0.15); color: var(--accent2); }
        .problem-row .pattern {
            color: var(--muted);
            font-size: 0.8rem;
            background: rgba(108,99,255,0.1);
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
        }
        .check-btn {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            background: transparent;
            color: transparent;
        }
        .check-btn.checked { background: var(--success); border-color: var(--success); color: var(--bg); }
        .fav-btn {
            background: none; border: none;
            cursor: pointer; font-size: 1.1rem;
            opacity: 0.3; transition: opacity 0.2s;
        }
        .fav-btn.active { opacity: 1; }

        /* Insight Box */
        .insight-box {
            margin: 12px 20px 16px;
            padding: 12px 16px;
            background: rgba(108,99,255,0.08);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .insight-box strong { color: var(--text); }

        /* How To Follow Tab */
        .guide-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
        }
        .guide-content h2 { color: var(--accent); margin: 24px 0 12px; font-size: 1.3rem; }
        .guide-content h2:first-child { margin-top: 0; }
        .guide-content p { margin-bottom: 12px; color: var(--muted); }
        .guide-content ul, .guide-content ol { margin: 12px 0 12px 24px; color: var(--muted); }
        .guide-content li { margin-bottom: 6px; }
        .guide-content code {
            background: rgba(108,99,255,0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--success);
        }
        .guide-content .tip-box {
            background: rgba(100,255,218,0.08);
            border: 1px solid rgba(100,255,218,0.2);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
        }
        .guide-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        .guide-content th, .guide-content td {
            padding: 10px 14px; text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .guide-content th { color: var(--accent); font-size: 0.85rem; }

        /* Cheat Sheet Tab */
        .cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px; }
        .cheat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .cheat-card h4 { color: var(--accent); margin-bottom: 10px; }
        .cheat-card pre {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            overflow-x: auto;
            color: var(--success);
        }

        /* Tab content visibility */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Responsive */
        @media (max-width: 768px) {
            .problem-row { grid-template-columns: 30px 1fr 70px 50px 40px; font-size: 0.85rem; }
            .problem-row .pattern { display: none; }
            .header h1 { font-size: 1.8rem; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

</div>

// ====== STATE MANAGEMENT (localStorage) ======
function getState() {
    return JSON.parse(localStorage.getItem('dsa-sheet-state') || '{"completed":{},"favorites":{},"lastDate":""}');
}
function saveState(state) {
    localStorage.setItem('dsa-sheet-state', JSON.stringify(state));
}
function updateStreak() {
    const state = getState();
    const today = new Date().toDateString();
    if (state.lastDate !== today) {
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (state.lastDate === yesterday) {
            state.streak = (state.streak || 0) + 1;
        } else if (state.lastDate !== today) {
            state.streak = 1;
        }
        state.lastDate = today;
        saveState(state);
    }
    document.getElementById('streak').textContent = state.streak || 0;
}

// ====== RENDER FUNCTIONS ======
function renderProblems(tabId, sections) {
    const container = document.getElementById(tabId);
    container.innerHTML = '';
    const state = getState();

    sections.forEach((sec, si) => {
        const div = document.createElement('div');
        div.className = 'section';
        const completedInSection = sec.problems.filter(p => state.completed[p.id]).length;
        div.innerHTML = `
            <div class="section-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                <h3>${sec.section}</h3>
                <span class="badge">${completedInSection}/${sec.problems.length}</span>
            </div>
            <div class="section-body">
                ${sec.problems.map((p, i) => `
                    <div class="problem-row" data-id="${p.id}" data-name="${p.name.toLowerCase()}" data-pattern="${p.pattern.toLowerCase()}">
                        <span class="num">${i+1}</span>
                        <span class="name"><a href="${p.link}" target="_blank">${p.name}</a></span>
                        <span class="diff diff-${p.diff.toLowerCase()}">${p.diff}</span>
                        <span class="pattern">${p.pattern}</span>
                        <button class="check-btn ${state.completed[p.id] ? 'checked' : ''}" onclick="toggleComplete('${p.id}')">✓</button>
                        <button class="fav-btn ${state.favorites[p.id] ? 'active' : ''}" onclick="toggleFavorite('${p.id}')">⭐</button>
                    </div>
                `).join('')}
                ${sec.insight ? `<div class="insight-box">💡 <strong>Key Insights:</strong> ${sec.insight}</div>` : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

function toggleComplete(id) {
    const state = getState();
    state.completed[id] = !state.completed[id];
    saveState(state);
    updateStats();
    updateStreak();
    renderActiveTab();
}
function toggleFavorite(id) {
    const state = getState();
    state.favorites[id] = !state.favorites[id];
    saveState(state);
    updateStats();
    renderActiveTab();
}

function updateStats() {
    const state = getState();
    const solved = Object.values(state.completed).filter(Boolean).length;
    const favs = Object.values(state.favorites).filter(Boolean).length;
    const total = Object.values(problems).flat().reduce((a, s) => a + s.problems.length, 0);
    document.getElementById('total-solved').textContent = solved;
    document.getElementById('total-problems').textContent = total;
    document.getElementById('fav-count').textContent = favs;
    document.getElementById('progress-fill').style.width = `${(solved/total*100).toFixed(1)}%`;
}

// ====== TABS ======
let activeTab = 'phase1';
function renderActiveTab() {
    if (problems[activeTab]) renderProblems(activeTab, problems[activeTab]);
}

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        activeTab = tab.dataset.tab;
        document.getElementById(activeTab).classList.add('active');
        if (problems[activeTab]) renderProblems(activeTab, problems[activeTab]);
    });
});

// ====== SEARCH ======
document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.problem-row').forEach(row => {
        const match = row.dataset.name.includes(q) || row.dataset.pattern.includes(q);
        row.style.display = match ? '' : 'none';
    });
});

// ====== FILTERS ======
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        const state = getState();
        document.querySelectorAll('.problem-row').forEach(row => {
            const id = row.dataset.id;
            if (filter === 'all') row.style.display = '';
